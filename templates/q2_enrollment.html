{% extends "base.html" %}
{% block title %}Q2: Course Enrollment{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="bi bi-book"></i> Course Enrollment Management</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="course_name" class="form-label">Course Name</label>
                        <input type="text" class="form-control" id="course_name" name="course_name" required placeholder="e.g., Python Programming">
                    </div>
                    <div class="mb-3">
                        <label for="credit" class="form-label">Credit Value</label>
                        <input type="number" class="form-control" id="credit" name="credit" min="1" required placeholder="e.g., 3">
                    </div>
                    <input type="hidden" name="action" value="enroll">
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-plus-circle"></i> Enroll in Course
                    </button>
                </form>
                
                {% if courses %}
                <hr>
                <h6>Enrolled Courses:</h6>
                <ul class="list-group">
                    {% for course, credit in courses.items() %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        {{ course }}
                        <span class="badge bg-primary rounded-pill">{{ credit }} credits</span>
                    </li>
                    {% endfor %}
                </ul>
                {% endif %}
            </div>
            <div class="card-footer">
                <form method="POST" class="d-inline">
                    <input type="hidden" name="action" value="clear">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Clear All Courses</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
